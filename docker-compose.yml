services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: graphmind
      POSTGRES_USER: graphmind
      POSTGRES_PASSWORD: graphmind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - upload_data:/app/uploads
    environment:
      PROJECT_NAME: GraphMind
      VERSION: 0.1.0
      ENVIRONMENT: development
      API_V1_PREFIX: /api/v1
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_SIZE_MB: "50"
      DATABASE_URL: postgresql+psycopg://graphmind:graphmind@postgres:5432/graphmind
      VIRUS_SCAN_ENABLED: "true"
      VIRUS_SCAN_FAIL_OPEN: "false"
      CLAMAV_HOST: clamav
      CLAMAV_PORT: "3310"
    depends_on:
      - postgres
      - clamav
    restart: unless-stopped

  clamav:
    image: clamav/clamav:stable
    ports:
      - "3310:3310"
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 60s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - api
    restart: unless-stopped

volumes:
  upload_data:
  postgres_data:
  clamav_data:
